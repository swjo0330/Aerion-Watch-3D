name: skywatch-rt

services:
  # ── FastAPI 백엔드 ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: skywatch-rt-backend:latest
    container_name: skywatch-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # .env 파일 값을 override하거나 추가할 환경변수
      HOST: "0.0.0.0"
      PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ── Next.js 프론트엔드 ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 브라우저에서 직접 접근하는 WebSocket URL (호스트에서 접근 가능해야 함)
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}"
        NEXT_PUBLIC_CESIUM_ION_TOKEN: "${NEXT_PUBLIC_CESIUM_ION_TOKEN:-}"
        # Next.js rewrites 목적지 (빌드 타임 고정 → Docker 내부 네트워크)
        BACKEND_INTERNAL_URL: "http://backend:8000"
    image: skywatch-rt-frontend:latest
    container_name: skywatch-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  default:
    name: skywatch-network
